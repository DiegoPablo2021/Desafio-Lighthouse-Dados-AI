<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LH Nautical Dashboard</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 1000px; padding: 2rem; background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; text-align: center; border: 1px solid rgba(255,255,255,0.1); animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .header { grid-column: 1 / -1; margin-bottom: 1rem; }
        h1 { margin: 0; font-size: 2.5rem; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { margin: 0; font-size: 1.2rem; color: #94a3b8; font-weight: normal; letter-spacing: 2px; text-transform: uppercase; }
        .card { background: rgba(0,0,0,0.2); padding: 2rem; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.2); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 60%); animation: pulse 3s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 100% { transform: scale(1.05); opacity: 1; } }
        .value { font-size: 3rem; font-weight: bold; margin: 1rem 0; color: #f8fafc; }
        .label { color: #38bdf8; text-transform: uppercase; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; }
        .chart-row { grid-column: 1 / -1; display: flex; justify-content: space-around; margin-top: 1rem; }
        .bar-container { display: flex; align-items: flex-end; gap: 10px; height: 100px; }
        .bar { width: 30px; background: linear-gradient(to top, #3b82f6, #38bdf8); border-radius: 5px 5px 0 0; animation: grow 1.5s ease-out forwards; transform-origin: bottom; }
        @keyframes grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LH Nautical Analytics (2023-2024)</h1>
            <h2>Performance & Data Science Report</h2>
        </div>
        <div class="card" style="animation-delay: 0.2s;">
            <div class="label">Total Revenue</div>
            <div class="value">R$ 5.8M</div>
        </div>
        <div class="card" style="animation-delay: 0.4s;">
            <div class="label">ROI Discovered</div>
            <div class="value" style="color: #4ade80;">+R$ 567K</div>
        </div>
        <div class="card" style="animation-delay: 0.6s;">
            <div class="label">Yamaha Cross-sell</div>
            <div class="value" style="color: #c084fc;">86.9%</div>
        </div>
        <div class="chart-row">
            <div class="bar-container">
                <div class="bar" style="height: 40%;"></div>
                <div class="bar" style="height: 60%; background: linear-gradient(to top, #8b5cf6, #c084fc);"></div>
                <div class="bar" style="height: 50%;"></div>
                <div class="bar" style="height: 80%;"></div>
                <div class="bar" style="height: 100%; background: linear-gradient(to top, #22c55e, #4ade80);"></div>
            </div>
        </div>
    </div>
</body>
</html>
